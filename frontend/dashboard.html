<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Kisan Setu</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Tiro+Devanagari+Hindi&family=Yatra+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="logo" style="display: flex; align-items: center; gap: 10px;">
            <img src="img/logo.png" alt="Logo" class="logo-img">
            <div>
                <h2>Kisan Setu</h2>
                <span>खेत से विश्वास तक</span>
            </div>
        </div>
        <ul class="nav-links"></ul>
        <div class="hamburger"><i class='bx bx-menu'></i></div>
    </nav>

    <div class="dashboard-container">
        <aside class="sidebar">
            <ul class="sidebar-menu">
                <li><a href="dashboard.html" class="active"><i class='bx bxs-dashboard'></i> Dashboard</a></li>
                <li><a href="contracts.html"><i class='bx bxs-file-blank'></i> Contracts</a></li>
                <li><a href="monitoring.html"><i class='bx bx-map-alt'></i> Monitoring</a></li>
                <li id="farmersLink" style="display:none;"><a href="farmer-profile.html"><i class='bx bxs-user-detail'></i> Hire Farmers</a></li>
            </ul>
        </aside>
        
        <main class="main-content">
            <h2 id="welcomeMsg" class="yatra-font">Welcome</h2>
            
            <div class="content-panel">
                <h3>My Farms / Lands</h3>
                <div id="farmsList" class="features-grid" style="margin-top: 20px;"></div>
            </div>

            <div class="content-panel">
                <h3>Recent Activity & Active Contracts</h3>
                <div id="contractsList" class="features-grid" style="margin-top: 20px;"></div>
            </div>
            
            <div id="addFarmPanel" class="content-panel" style="display:none;">
                <h3>Add New Farm</h3>
                <form id="addFarmForm" style="max-width: 400px; margin-top: 15px;">
                    <div class="form-group"><label>Farm Name</label><input type="text" id="farmName" required></div>
                    <div class="form-group"><label>Size (Acres)</label><input type="number" id="farmSize" required></div>
                    <div class="form-group"><label>Crop Type</label><input type="text" id="farmCrop" required></div>
                    <div class="form-group"><label>Location / Address</label><input type="text" id="farmAddress" required></div>
                    <button type="submit" class="btn-primary">Add Farm</button>
                </form>
            </div>
        </main>
    </div>

    <div id="toast" class="toast"></div>

    <script src="js/config.js"></script>
    <script src="js/main.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
